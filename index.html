<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D3EIXO</title>
    <link rel="stylesheet" href="CSS/responsive.css">
    <link rel="stylesheet" href="CSS/grafico.css">
    <link rel="stylesheet" href="CSS/legenda.css">
    <script src="https://d3js.org/d3.v6.min.js"></script>
    <script src="JS/grafico.js"></script>
    <script src="JS/legenda.js"></script>
    <script src="JS/tooltip.js"></script>
    
<script>
    const clicado = (d) => alert(d.chave + ' = ' + d.valor);
    onload = () => {
        let dados = [
        {chave: 'Frango', valor: 56},
        {chave: 'Carne', valor: 73},
        {chave: 'Vegetariano', valor: 20},
        {chave: 'Quejo', valor: 115},
        {chave: 'Goiabada', valor: 44},
        {chave: 'Banana', valor: 60},
        {chave: 'Calabresa', valor: 33},
        ];
        let graf = new Grafico({
            seletor: '#grafico',
            dados: dados,
            largura: 600,
            altura: 400,
            tituloX: 'Tipos de pastéis',
            tituloY: 'Quantidade diária',
            callback: clicado
        });

        crescente.onclick = () => {
            dados.sort((a, b) => a.valor - b.valor);
            graf.atualize(dados);
        };

         decrescente.onclick = () => {
            dados.sort((a, b) => b.valor - a.valor);
            graf.atualize(dados);
        };

         alfabetica.onclick = () => {
            dados.sort((a, b) => a.chave.localeCompare(b.chave));
            graf.atualize(dados);
        };
    };
</script>

</head>
<body>
<figure>
    <figcaption>Vendas médias diárias</figcaption>
   <SVG id="grafico"></SVG>
   <div id="botoes">
    <button id="crescente">Ordem crescente</button>
    <button id="decrescente">Ordem decrescente</button>
    <button id="alfabetica">Ordem alfabética</button>
   </div>
</figure>

<footer>
    <span>
        &copy; Vanderlei Jose da Silva, 2026 - Todos os direitos reservados.
    </span>
</footer>

</body>
</html>
